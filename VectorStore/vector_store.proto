syntax = "proto3";

package vectorstore;

service VectorStoreService {
  rpc SearchSimilar(SearchSimilarRequest) returns (SearchSimilarReply);
  rpc Store(StoreRequest) returns (StoreReply);
}

message SearchSimilarRequest {
  repeated float vector = 1;
}

message SearchSimilarReply {
  bool found = 1;
  string prompt = 2;
  string response = 3;
  float similarity_score = 4;
}

message StoreRequest {
  string prompt = 1;
  string response = 2;
  repeated float vector = 3;
}

message StoreReply {
  bool success = 1;
}
